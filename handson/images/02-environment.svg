<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <rect width="720" height="400" fill="#f0f4f8"/>
  <!-- Top bar -->
  <rect width="720" height="44" fill="#1b1b1b"/>
  <text x="20" y="28" font-family="Segoe UI,sans-serif" font-size="14" fill="#fff">Microsoft Copilot Studio</text>
  <!-- Environment dropdown -->
  <rect x="12" y="56" width="200" height="36" rx="6" fill="#fff" stroke="#0969da" stroke-width="2"/>
  <text x="24" y="79" font-family="Segoe UI,sans-serif" font-size="13" fill="#0969da">Environment: Dev-01</text>
  <text x="190" y="79" font-family="Segoe UI,sans-serif" font-size="12" fill="#0969da">v</text>
  <!-- Dropdown list -->
  <rect x="12" y="94" width="200" height="140" rx="6" fill="#fff" stroke="#d0d7de" filter="url(#shadow)"/>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/></filter></defs>
  <rect x="16" y="100" width="192" height="32" rx="4" fill="#ddf4ff"/>
  <text x="28" y="121" font-family="Segoe UI,sans-serif" font-size="13" fill="#0969da">Dev-01 (current)</text>
  <rect x="16" y="136" width="192" height="32" rx="4" fill="#fff"/>
  <text x="28" y="157" font-family="Segoe UI,sans-serif" font-size="13" fill="#333">Production</text>
  <rect x="16" y="172" width="192" height="32" rx="4" fill="#fff"/>
  <text x="28" y="193" font-family="Segoe UI,sans-serif" font-size="13" fill="#333">Sandbox</text>
  <!-- Arrow annotation -->
  <line x1="230" y1="74" x2="215" y2="74" stroke="#e5383b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e5383b"/></marker></defs>
  <rect x="234" y="60" width="200" height="28" rx="4" fill="#fff3cd"/>
  <text x="244" y="79" font-family="Segoe UI,sans-serif" font-size="12" fill="#856404">Click here to select environment</text>
  <!-- Main content placeholder -->
  <rect x="240" y="120" width="460" height="50" rx="6" fill="#fff" stroke="#d0d7de"/>
  <text x="260" y="150" font-family="Segoe UI,sans-serif" font-size="14" fill="#666">Agent list will appear here...</text>
  <rect x="240" y="184" width="460" height="50" rx="6" fill="#fff" stroke="#d0d7de"/>
  <rect x="240" y="248" width="460" height="50" rx="6" fill="#fff" stroke="#d0d7de"/>
</svg>