<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#f0f4f8"/>
  <!-- Top bar -->
  <rect width="720" height="44" fill="#1b1b1b"/>
  <text x="20" y="28" font-family="Segoe UI,sans-serif" font-size="14" fill="#fff">Microsoft Copilot Studio</text>
  <text x="220" y="28" font-family="Segoe UI,sans-serif" font-size="13" fill="#aaa">Create > New agent</text>
  <!-- Form area -->
  <rect x="120" y="64" width="480" height="340" rx="10" fill="#fff" stroke="#d0d7de"/>
  <text x="160" y="100" font-family="Segoe UI,sans-serif" font-size="18" font-weight="bold" fill="#1b1b1b">Create a new agent</text>
  <!-- Name field -->
  <text x="160" y="136" font-family="Segoe UI,sans-serif" font-size="13" fill="#57606a">Name *</text>
  <rect x="160" y="144" width="360" height="36" rx="6" fill="#fff" stroke="#0969da" stroke-width="2"/>
  <text x="172" y="167" font-family="Segoe UI,sans-serif" font-size="13" fill="#1b1b1b">IT Helpdesk Bot</text>
  <!-- Description field -->
  <text x="160" y="204" font-family="Segoe UI,sans-serif" font-size="13" fill="#57606a">Description</text>
  <rect x="160" y="212" width="360" height="36" rx="6" fill="#fff" stroke="#d0d7de"/>
  <text x="172" y="235" font-family="Segoe UI,sans-serif" font-size="13" fill="#666">IT support agent for employees</text>
  <!-- Instructions field -->
  <text x="160" y="272" font-family="Segoe UI,sans-serif" font-size="13" fill="#57606a">Instructions</text>
  <rect x="160" y="280" width="360" height="60" rx="6" fill="#fff" stroke="#d0d7de"/>
  <text x="172" y="303" font-family="Segoe UI,sans-serif" font-size="12" fill="#666">You are a friendly IT support assistant.</text>
  <text x="172" y="321" font-family="Segoe UI,sans-serif" font-size="12" fill="#666">Answer IT questions clearly and concisely.</text>
  <!-- Create button -->
  <rect x="410" y="356" width="110" height="36" rx="6" fill="#0969da"/>
  <text x="438" y="379" font-family="Segoe UI,sans-serif" font-size="14" font-weight="bold" fill="#fff">Create</text>
  <rect x="290" y="356" width="110" height="36" rx="6" fill="#fff" stroke="#d0d7de"/>
  <text x="322" y="379" font-family="Segoe UI,sans-serif" font-size="14" fill="#57606a">Cancel</text>
</svg>