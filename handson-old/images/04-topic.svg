<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <rect width="720" height="380" fill="#f0f4f8"/>
  <!-- Top bar -->
  <rect width="720" height="44" fill="#1b1b1b"/>
  <text x="20" y="28" font-family="Segoe UI,sans-serif" font-size="14" fill="#fff">Microsoft Copilot Studio</text>
  <text x="220" y="28" font-family="Segoe UI,sans-serif" font-size="13" fill="#aaa">IT Helpdesk Bot > Topics</text>
  <!-- Topic canvas -->
  <rect x="180" y="56" width="520" height="310" fill="#fafbfc"/>
  <!-- Trigger node -->
  <rect x="300" y="72" width="240" height="64" rx="8" fill="#fff" stroke="#0969da" stroke-width="2"/>
  <rect x="300" y="72" width="240" height="24" rx="8" fill="#0969da"/>
  <rect x="300" y="84" width="240" height="12" fill="#0969da"/>
  <text x="370" y="89" font-family="Segoe UI,sans-serif" font-size="12" font-weight="bold" fill="#fff">Trigger</text>
  <text x="316" y="118" font-family="Segoe UI,sans-serif" font-size="11" fill="#333">Phrases: password reset, ...</text>
  <!-- Connector -->
  <line x1="420" y1="136" x2="420" y2="164" stroke="#0969da" stroke-width="2"/>
  <circle cx="420" cy="164" r="4" fill="#0969da"/>
  <!-- Message node -->
  <rect x="300" y="172" width="240" height="56" rx="8" fill="#fff" stroke="#d0d7de"/>
  <rect x="300" y="172" width="240" height="24" rx="8" fill="#5c5c5c"/>
  <rect x="300" y="184" width="240" height="12" fill="#5c5c5c"/>
  <text x="370" y="189" font-family="Segoe UI,sans-serif" font-size="12" font-weight="bold" fill="#fff">Message</text>
  <text x="316" y="214" font-family="Segoe UI,sans-serif" font-size="11" fill="#333">Enter your employee ID</text>
  <!-- Connector -->
  <line x1="420" y1="228" x2="420" y2="256" stroke="#0969da" stroke-width="2"/>
  <circle cx="420" cy="256" r="4" fill="#0969da"/>
  <!-- Question node -->
  <rect x="300" y="264" width="240" height="56" rx="8" fill="#fff" stroke="#d0d7de"/>
  <rect x="300" y="264" width="240" height="24" rx="8" fill="#2da44e"/>
  <rect x="300" y="276" width="240" height="12" fill="#2da44e"/>
  <text x="366" y="281" font-family="Segoe UI,sans-serif" font-size="12" font-weight="bold" fill="#fff">Question</text>
  <text x="316" y="306" font-family="Segoe UI,sans-serif" font-size="11" fill="#333">Identify: Employee Number</text>
  <!-- Sidebar topic list -->
  <rect x="0" y="44" width="180" height="336" fill="#e8e8e8"/>
  <text x="16" y="72" font-family="Segoe UI,sans-serif" font-size="13" font-weight="bold" fill="#333">Topics</text>
  <rect x="10" y="82" width="160" height="28" rx="4" fill="#ddf4ff"/>
  <text x="22" y="101" font-family="Segoe UI,sans-serif" font-size="12" fill="#0969da">Password Reset</text>
  <rect x="10" y="114" width="160" height="28" rx="4" fill="#fff"/>
  <text x="22" y="133" font-family="Segoe UI,sans-serif" font-size="12" fill="#333">VPN Connection</text>
  <rect x="10" y="146" width="160" height="28" rx="4" fill="#fff"/>
  <text x="22" y="165" font-family="Segoe UI,sans-serif" font-size="12" fill="#333">Software Install</text>
  <!-- + button -->
  <rect x="10" y="186" width="160" height="28" rx="4" fill="#fff" stroke="#d0d7de" stroke-dasharray="4,2"/>
  <text x="70" y="205" font-family="Segoe UI,sans-serif" font-size="13" fill="#0969da">+ New topic</text>
</svg>